<div class="wiki-card">
  <div class="wiki-overview">
    {{thumbnail}}
    <a
      class="wiki-title"
      href="{{url}}"
      target="_blank"
      rel="noopener noreferrer"
      >{{title}}</a
    >
    <p class="wiki-desc">{{description}}</p>
    <p class="wiki-extract">{{extract}}</p>
  </div>
  <div class="wiki-body">
    <a
      class="wiki-footer-link"
      href="{{url}}"
      target="_blank"
      rel="noopener noreferrer"
      >{{t:wikipedia.view-on-wikipedia}}</a
    >
  </div>
</div>
