<form action="/search" method="get" id="search-form-home" class="search-form">
  <div class="search-bar" id="search-bar-home">
    <svg
      class="search-icon"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="#9aa0a6"
      stroke-width="2"
    >
      <circle cx="11" cy="11" r="8" />
      <path d="M21 21l-4.35-4.35" />
    </svg>
    <input
      type="text"
      class="search-input"
      id="search-input"
      name="q"
      autocomplete="off"
      placeholder=""
    />
    <div class="ac-dropdown" id="ac-dropdown-home"></div>
    <div id="search-bar-actions-home" class="search-bar-actions"></div>
  </div>
  <div class="button-row">
    <button type="submit" class="search-btn" id="btn-search">
      {{t:index-templates.search.search-button}}
    </button>
    <button type="button" class="search-btn lucky-btn" id="btn-lucky">
      <span class="lucky-default"
        >{{t:index-templates.search.feeling-lucky}}</span
      >
      <div class="lucky-slot">
        <div class="lucky-slot-inner" id="lucky-slot-inner">
          <span>{{t:index-templates.search.feeling-lucky}}</span>
          <span class="lucky-alt"
            >{{t:index-templates.search.feeling-curious}}</span
          >
          <span class="lucky-alt"
            >{{t:index-templates.search.feeling-adventurous}}</span
          >
          <span class="lucky-alt"
            >{{t:index-templates.search.feeling-playful}}</span
          >
          <span class="lucky-alt"
            >{{t:index-templates.search.feeling-stellar}}</span
          >
          <span class="lucky-alt"
            >{{t:index-templates.search.feeling-trendy}}</span
          >
        </div>
      </div>
    </button>
  </div>
</form>
